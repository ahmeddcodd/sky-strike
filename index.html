<!doctype html>
<html lang="en">
  <head>
    <!-- YouTube Playables SDK — MUST load before any game code. Serves as a
         no-op when the game runs outside YouTube (local dev, plain browsers). -->
    <script src="https://www.youtube.com/game_api/v1"></script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b2547" />
    <meta
      name="description"
      content="Sky Strike 3D — a fast 3D arcade jet shooter. Fly your fighter, lock onto incoming enemy jets, and shoot them down before they reach you."
    />
    <meta property="og:title" content="Sky Strike 3D" />
    <meta
      property="og:description"
      content="Fly your fighter jet and shoot down incoming enemies in this fast 3D arcade shooter."
    />
    <meta property="og:type" content="website" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>"
    />
    <title>Sky Strike 3D</title>
    <!-- Critical loader styles inlined so the loader paints before the CSS
         bundle loads. Fade-out + finer details live in style.css. -->
    <style>
      html, body { margin: 0; height: 100%; background: #0b2547; }
      #loader {
        position: fixed; inset: 0; z-index: 1000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 20px;
        background: radial-gradient(120% 90% at 50% 38%, #14335f 0%, #0b2547 55%, #071930 100%);
        font-family: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
        color: #cfe4f7; transition: opacity 0.45s ease;
      }
      #loader .loader-emblem { width: 128px; animation: ldFloat 2s ease-in-out infinite; }
      #loader .loader-emblem svg { width: 100%; display: block;
        filter: drop-shadow(0 0 14px rgba(95,182,232,0.55)); }
      #loader .loader-title {
        font-size: 34px; font-weight: 900; font-style: italic; letter-spacing: 2px;
        color: #eaf4ff; text-shadow: 0 3px 0 rgba(10,26,52,0.9), 0 10px 20px rgba(0,0,0,0.5);
      }
      #loader .loader-title span { color: #ffd75e; margin-left: 8px; letter-spacing: 6px; }
      #loader .loader-bar {
        width: 190px; height: 5px; border-radius: 999px; overflow: hidden;
        background: rgba(255,255,255,0.12);
      }
      #loader .loader-bar-fill {
        width: 40%; height: 100%; border-radius: 999px;
        background: linear-gradient(90deg, #47bce8, #a5f1ff);
        animation: ldSweep 1.1s ease-in-out infinite;
      }
      #loader .loader-hint {
        font-size: 11px; font-weight: 700; letter-spacing: 4px; opacity: 0.7;
      }
      #loader.done { opacity: 0; pointer-events: none; }
      @keyframes ldFloat { 50% { transform: translateY(-8px); } }
      @keyframes ldSweep {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(370%); }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud"></div>
    <!-- Static CSS-only loader: paints instantly (before the JS bundle parses),
         removed on the first rendered frame. Covers the synchronous scene build. -->
    <div id="loader">
      <div class="loader-emblem">
        <svg viewBox="0 0 140 56">
          <defs>
            <linearGradient id="ldJet" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ffffff" />
              <stop offset="0.55" stop-color="#bfe4fa" />
              <stop offset="1" stop-color="#5fb6e8" />
            </linearGradient>
          </defs>
          <g fill="#7fc8ef" opacity="0.8">
            <path d="M4 31 h36 l-6 4 H12 Z" />
            <path d="M16 24 h28 l-5 4 H22 Z" />
            <path d="M28 17 h20 l-4 4 H33 Z" />
            <path d="M136 31 h-36 l6 4 h22 Z" />
            <path d="M124 24 h-28 l5 4 h18 Z" />
            <path d="M112 17 h-20 l4 4 h11 Z" />
          </g>
          <path fill="url(#ldJet)" d="M70 2 C72 9 73 15 73 21 L102 38 L102 42 L73 33 L72 44 L81 50 L81 53 L70 49 L59 53 L59 50 L68 44 L67 33 L38 42 L38 38 L67 21 C67 15 68 9 70 2 Z" />
        </svg>
      </div>
      <div class="loader-title">SKY STRIKE<span>3D</span></div>
      <div class="loader-bar"><div class="loader-bar-fill"></div></div>
      <div class="loader-hint">LOADING…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
