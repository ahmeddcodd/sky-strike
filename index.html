<html lang="en">

    <meta charset="UTF-8" />

      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"

      content="Sky Strike 3D — a fast 3D arcade jet shooter. Fly your fighter, lock onto incoming enemy jets, and shoot them down before they reach you."
    />

    />

    <div id="hud"></div>
    <script type="module" src="/src/main.ts"></script>
